<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信内容互动组件 · 股票场景 — 产品 Demo</title>
  <style>
/* 微信内容互动组件 Demo - 公共样式 */

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Helvetica, "Microsoft YaHei", sans-serif;
  background: #ededed;
  color: #191919;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.5;
}

a { color: #576B95; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }

.app {
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 20px;
  min-height: 100vh;
}

/* 左侧导航 */
.sidebar {
  background: #fff;
  border-radius: 12px;
  padding: 20px 16px;
  position: sticky;
  top: 24px;
  align-self: start;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.sidebar-header { padding: 4px 8px 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 12px; }
.sidebar-title { font-size: 15px; font-weight: 600; color: #07c160; letter-spacing: 0.5px; }
.sidebar-subtitle { font-size: 11px; color: #999; margin-top: 4px; line-height: 1.6; }

.nav-list { list-style: none; }
.nav-item {
  display: flex;
  align-items: flex-start;
  padding: 10px 8px;
  border-radius: 8px;
  margin-bottom: 4px;
  cursor: pointer;
  color: #333;
  transition: background 0.15s ease;
  font-size: 13px;
}
.nav-item:hover { background: #f7f7f7; }
.nav-item.active { background: rgba(7,193,96,0.08); color: #07c160; font-weight: 500; }
.nav-num {
  flex-shrink: 0;
  width: 22px; height: 22px; border-radius: 50%;
  background: #e6e6e6; color: #666;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600;
  margin-right: 10px; margin-top: 1px;
}
.nav-item.active .nav-num { background: #07c160; color: #fff; }
.nav-text { flex: 1; }
.nav-tag { font-size: 10px; color: #999; margin-top: 2px; }

/* 主区域 */
.main {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 420px;
  gap: 20px;
  align-items: start;
}

/* 手机页面：手机 390px + 剩余空间给说明 */
.main.with-phone {
  grid-template-columns: 390px minmax(360px, 1fr);
}

.phone-frame {
  width: 390px;
  flex-shrink: 0;
  background: #000;
  border-radius: 40px;
  padding: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  position: sticky;
  top: 24px;
}
.phone-screen {
  width: 100%;
  height: 760px;
  background: #ededed;
  border-radius: 32px;
  overflow: hidden;
  position: relative;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 26px;
  background: #000;
  border-bottom-left-radius: 14px;
  border-bottom-right-radius: 14px;
  z-index: 100;
}

/* 桌面页面 */
.desktop-screen {
  width: 100%;
  min-width: 0;
  min-height: 760px;
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  position: relative;
}

/* 说明卡片 */
.notes {
  width: 100%;
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.notes h2 {
  font-size: 18px;
  margin-bottom: 4px;
  color: #191919;
}
.notes h2 .num-badge {
  display: inline-block;
  background: #07c160;
  color: #fff;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-right: 8px;
  vertical-align: middle;
  font-weight: 500;
}
.notes h3 { font-size: 14px; color: #888; margin-bottom: 16px; font-weight: normal; }
.notes-section { margin-bottom: 18px; }
.notes-section h4 {
  font-size: 13px;
  color: #07c160;
  margin-bottom: 8px;
  font-weight: 600;
  letter-spacing: 0.3px;
}
.notes-section p, .notes-section li { font-size: 13px; color: #555; line-height: 1.7; }
.notes-section ul { padding-left: 18px; }
.notes-section .tag {
  display: inline-block;
  background: #f4f4f4;
  color: #666;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  margin-right: 6px;
}
.notes-nav {
  display: flex;
  gap: 8px;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid #f0f0f0;
}
.notes-nav button {
  flex: 1;
  padding: 10px 12px;
  border-radius: 6px;
  font-size: 13px;
  background: #f7f7f7;
  color: #333;
  transition: all 0.15s ease;
}
.notes-nav button:hover { background: #07c160; color: #fff; }
.notes-nav button:disabled { opacity: 0.4; cursor: not-allowed; }
.notes-nav button:disabled:hover { background: #f7f7f7; color: #333; }

/* 文字辅助 */
.muted { color: #888; }
.label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }

@media (max-width: 1280px) {
  .app { grid-template-columns: 220px 1fr; gap: 16px; padding: 16px; }
  .main { grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; }
  .main.with-phone { grid-template-columns: 390px minmax(320px, 1fr); }
}

@media (max-width: 1100px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .main { display: flex; flex-direction: column; }
  .main.with-phone { display: flex; flex-direction: column; }
  .phone-frame { position: static; margin: 0 auto; }
  .notes { width: 100%; }
}


/* 各演示页面专用样式 */

/* ==================== 页面 1：创作者后台（桌面端 · 真实公众号样式） ==================== */
.creator-bg-page {
  font-size: 13px;
  background: #f4f5f7;
  height: 100%;
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}

/* 顶部深色条 */
.cw-topbar {
  height: 48px;
  background: #2e3033;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 20px;
  font-size: 13px;
  gap: 16px;
  flex-shrink: 0;
}
.cw-logo { color: #fff; font-weight: 400; font-size: 14px; letter-spacing: 0.5px; }
.cw-logo::before {
  content: '';
  display: inline-block;
  width: 18px; height: 18px;
  background: #07c160;
  border-radius: 3px;
  margin-right: 8px;
  vertical-align: -4px;
}
.cw-topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 20px;
  color: #ccc;
  font-size: 12px;
}
.cw-topbar-right .cw-avatar-sm {
  width: 24px; height: 24px; border-radius: 50%;
  background: #07c160; color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px;
  margin-right: 4px;
}

.cw-body { flex: 1; display: flex; min-height: 0; }

/* 左侧导航 */
.cw-sidebar {
  width: 200px;
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid #e8e8e8;
  padding: 12px 0;
  font-size: 13px;
  overflow-y: auto;
}
.cw-nav-group { margin-bottom: 4px; }
.cw-nav-title {
  padding: 8px 20px 4px;
  font-size: 11px;
  color: #999;
  letter-spacing: 0.3px;
}
.cw-sidebar-item {
  padding: 9px 20px 9px 32px;
  color: #444;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  position: relative;
}
.cw-sidebar-item::before {
  content: '';
  position: absolute;
  left: 18px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #c8c8c8;
}
.cw-sidebar-item.active {
  background: #f0f9f0;
  color: #07c160;
  font-weight: 500;
}
.cw-sidebar-item.active::before { background: #07c160; }
.cw-sidebar-item:hover { background: #f7f7f7; }

/* 主编辑区容器 */
.cw-main {
  flex: 1;
  padding: 16px 20px;
  overflow-y: auto;
  min-width: 0;
}

/* 无侧边栏时的主区域 —— 拓宽且居中 */
.cw-main-full {
  flex: 1;
  padding: 20px 40px;
  overflow-y: auto;
  min-width: 0;
  max-width: 100%;
}
.cw-main-full .cw-editor {
  max-width: 100%;
}

.cw-crumb {
  font-size: 12px;
  color: #999;
  margin-bottom: 12px;
}
.cw-crumb .crumb-current { color: #333; }

/* 编辑卡片 */
.cw-editor {
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 2px;
  display: flex;
  flex-direction: column;
}

/* 标题 / 作者 / 封面等元信息 */
.cw-meta-row {
  display: flex;
  padding: 14px 20px;
  border-bottom: 1px solid #f0f0f0;
  align-items: center;
  gap: 12px;
}
.cw-meta-row.title-row { padding-bottom: 8px; }
.cw-label {
  width: 80px;
  font-size: 13px;
  color: #888;
  flex-shrink: 0;
}
.cw-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 14px;
  color: #191919;
  padding: 4px 0;
  background: transparent;
}
.cw-input-title {
  font-size: 18px;
  font-weight: 500;
}
.cw-counter {
  color: #bbb;
  font-size: 12px;
  margin-left: 10px;
}

/* 工具栏 */
.cw-toolbar {
  display: flex;
  align-items: center;
  padding: 6px 14px;
  border-bottom: 1px solid #f0f0f0;
  gap: 2px;
  font-size: 13px;
  flex-wrap: wrap;
  background: #fafafa;
  position: relative;
}
.cw-toolbar-group {
  display: flex;
  gap: 2px;
  border-right: 1px solid #e6e6e6;
  padding-right: 8px;
  margin-right: 4px;
}
.cw-toolbar-group:last-child { border-right: none; }
.cw-tool {
  padding: 5px 8px;
  border-radius: 3px;
  color: #555;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 12px;
  min-width: 26px;
  justify-content: center;
}
.cw-tool:hover { background: #ececec; }
.cw-tool b { font-weight: 700; }
.cw-tool i { font-style: italic; }
.cw-tool u { text-decoration: underline; }

/* 股票工具入口 */
.cw-stock-tool {
  padding: 5px 10px !important;
  background: linear-gradient(135deg, rgba(7,193,96,0.10) 0%, rgba(7,193,96,0.04) 100%);
  border: 1px solid rgba(7,193,96,0.3);
  border-radius: 4px;
  color: #07c160 !important;
  font-weight: 500;
  position: relative;
}
.cw-stock-tool:hover { background: rgba(7,193,96,0.18) !important; }
.cw-stock-tool .new-badge {
  position: absolute;
  top: -6px; right: -6px;
  background: #ff5252;
  color: #fff;
  font-size: 9px;
  padding: 1px 4px;
  border-radius: 4px;
  font-weight: 600;
  line-height: 1.3;
}

.cw-pulse-dot {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #07c160;
  animation: pulse 1.6s infinite;
  pointer-events: none;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(7,193,96,0.6); }
  70% { box-shadow: 0 0 0 12px rgba(7,193,96,0); }
  100% { box-shadow: 0 0 0 0 rgba(7,193,96,0); }
}

/* 编辑正文 */
.cw-content {
  padding: 20px 24px 40px;
  flex: 1;
  font-size: 15px;
  line-height: 1.8;
  color: #333;
  min-height: 360px;
}
.cw-content p { margin-bottom: 12px; }
.cw-content .stock-mention { color: #555; }

/* 编辑器里真实的截图占位 / 正图 */
.cw-content .editor-img {
  background: #f8f8f8;
  border: 1px solid #ececec;
  padding: 8px;
  text-align: center;
  margin: 14px auto;
  max-width: 360px;
  border-radius: 2px;
}
.cw-content .editor-img img {
  display: block;
  max-width: 100%;
  border-radius: 2px;
}
.cw-content .editor-img-caption {
  font-size: 12px;
  color: #999;
  margin-top: 4px;
  text-align: center;
}

/* 底部按钮区 */
.cw-footer-bar {
  padding: 14px 20px;
  background: #fafafa;
  border-top: 1px solid #f0f0f0;
  display: flex;
  gap: 10px;
  align-items: center;
}
.cw-footer-bar .cw-btn {
  padding: 6px 18px;
  font-size: 13px;
  border-radius: 2px;
  cursor: pointer;
}
.cw-footer-bar .cw-btn-primary { background: #07c160; color: #fff; }
.cw-footer-bar .cw-btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
.cw-footer-bar .cw-autosave { margin-left: auto; color: #999; font-size: 12px; }

/* ==================== 弹窗 ==================== */
.modal-mask {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.2s ease;
}
.modal-mask.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  width: 480px;
  max-width: 90%;
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  animation: scaleIn 0.2s ease;
  max-height: 90%;
  display: flex;
  flex-direction: column;
}
@keyframes scaleIn { from { transform: scale(0.95); } to { transform: scale(1); } }

.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h3 { font-size: 15px; color: #191919; }
.modal-header .modal-close { color: #999; font-size: 18px; cursor: pointer; }

.modal-body { padding: 16px 20px; flex: 1; overflow-y: auto; font-size: 13px; color: #444; }
.modal-body .modal-tip {
  background: #f0f9f0;
  border-left: 3px solid #07c160;
  padding: 10px 12px;
  font-size: 12px;
  color: #555;
  margin-bottom: 16px;
  border-radius: 0 4px 4px 0;
}

.detected-list { margin-bottom: 14px; }
.detected-item {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid #f0f0f0;
  border-radius: 6px;
  margin-bottom: 8px;
  background: #fafafa;
}
.detected-item input[type=checkbox] { margin-right: 10px; }
.detected-item .name { flex: 1; font-weight: 500; color: #333; }
.detected-item .code { color: #888; font-size: 12px; margin-right: 10px; }
.detected-item .confidence {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  background: #e6f7ed;
  color: #07c160;
}
.detected-item .confidence.low {
  background: #fff7e6; color: #faad14;
}
.detected-img-section {
  margin-top: 16px;
  padding-top: 14px;
  border-top: 1px dashed #ececec;
}
.detected-img-section .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
.detected-img-section .count-tag {
  background: rgba(7,193,96,0.1); color: #07c160; font-size: 11px;
  padding: 2px 8px; border-radius: 10px;
}
.detected-img-preview {
  background: #f0f0f0;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 12px;
  color: #666;
  display: flex;
  gap: 8px;
  align-items: center;
}

.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid #f0f0f0;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn {
  padding: 7px 18px;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
.btn-primary { background: #07c160; color: #fff; }
.btn-primary:hover { background: #06ae56; }
.btn-default { background: #f0f0f0; color: #555; }
.btn-default:hover { background: #e6e6e6; }

/* ==================== 页面 3：前后对比 ==================== */
.before-after-page {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
}
.ba-header {
  padding: 14px 16px;
  background: #fff;
  border-bottom: 1px solid #ececec;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ba-header h3 { font-size: 15px; color: #191919; }
.ba-stats { font-size: 12px; color: #07c160; }
.ba-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: #ececec;
  overflow: hidden;
}
.ba-pane {
  background: #fff;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.ba-pane-header {
  padding: 8px 14px;
  background: #fafafa;
  border-bottom: 1px solid #ececec;
  font-size: 12px;
  color: #666;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ba-pane-header .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: #999; }
.ba-pane.after .ba-pane-header .tag-dot { background: #07c160; }
.ba-pane.after .ba-pane-header { color: #07c160; }
.ba-pane-content {
  flex: 1;
  padding: 16px 18px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.8;
  color: #333;
}
.ba-pane-content p { margin-bottom: 10px; }
.ba-pane-content .stock-link {
  color: #576B95;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
  cursor: default;
}
.ba-image-block {
  position: relative;
  background: #fff;
  border: 1px solid #ececec;
  border-radius: 4px;
  padding: 10px;
  text-align: center;
  margin: 10px 0;
}
.ba-image-block .ba-img {
  display: block;
  max-width: 100%;
  width: 260px;
  margin: 0 auto 8px;
  border-radius: 2px;
}
.ba-image-block .img-label { font-size: 12px; color: #666; margin-bottom: 4px; }
.ba-image-block .img-stock-list { font-size: 11px; color: #999; }
.ba-image-block.interactive .recognize-btn {
  margin-top: 10px;
  display: inline-block;
  padding: 4px 10px;
  background: #fff;
  border: 1px solid #07c160;
  color: #07c160;
  font-size: 11px;
  border-radius: 12px;
}

/* ==================== 页面 4：读者文章页（公众号样式） ==================== */
.reader-page {
  height: 100%;
  background: #fff;
  overflow-y: auto;
  position: relative;
}
.r-statusbar {
  height: 44px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 4px;
  font-size: 12px;
  font-weight: 600;
  color: #191919;
}
.r-navbar {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-size: 13px;
  color: #191919;
  border-bottom: 1px solid #f0f0f0;
}
.r-navbar .r-back { font-size: 18px; margin-right: 8px; }
.r-navbar .r-title { font-weight: 500; }

.r-article {
  padding: 16px 18px 80px;
}
.r-title {
  font-size: 20px;
  font-weight: 600;
  line-height: 1.4;
  color: #191919;
  margin-bottom: 12px;
}
.r-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #888;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid #f5f5f5;
}
.r-meta .r-author { color: #576B95; font-weight: 500; }
.r-meta .r-dot { color: #ccc; }
.r-content {
  font-size: 15px;
  line-height: 1.8;
  color: #333;
}
.r-content p { margin-bottom: 14px; }
.r-content .stock-link {
  color: #576B95;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
  cursor: pointer;
}
.r-content .stock-link:active { color: #3b5476; }
.r-content .img-block {
  margin: 14px -4px;
  background: #fff;
  border-radius: 4px;
  overflow: hidden;
}
.r-content .r-img {
  display: block;
  width: 100%;
  max-width: 100%;
}
.r-content .img-content {
  padding: 50px 16px;

    el.classList.toggle('active', el.dataset.page === page);
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('navList').addEventListener('click', e => {
  const item = e.target.closest('.nav-item');
  if (item) setPage(item.dataset.page);
});

// ========== 渲染入口 ==========
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  const withPhone = ['reader', 'drawer', 'assistant'].includes(state.page);
  main.classList.toggle('with-phone', withPhone);
  switch (state.page) {
    case 'welcome':   renderWelcome(main); break;
    case 'creator':   renderCreator(main); break;
    case 'config':    renderConfig(main); break;
    case 'compare':   renderCompare(main); break;
    case 'reader':    renderReader(main); break;
    case 'drawer':    renderDrawerPage(main); break;
    case 'assistant': renderAssistant(main); break;
    case 'roadmap':   renderRoadmap(main); break;
  }
}

function renderDetectedList(containerId, items, stateKey) {
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item => {
    const stock = STOCKS[item.key];
    const checked = state[stateKey].has(item.key);
    const low = item.conf < 0.85;
    return `
      <label class="detected-item">
        <input type="checkbox" data-key="${item.key}" data-state="${stateKey}" ${checked ? 'checked' : ''}>
        <span class="name">${stock.name}</span>
        <span class="code">${stock.code}</span>
        <span class="confidence ${low ? 'low' : ''}">置信度 ${(item.conf * 100).toFixed(0)}%</span>
      </label>
    `;
  }).join('');

  el.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const k = cb.dataset.key;
      const s = state[cb.dataset.state];
      if (cb.checked) s.add(k); else s.delete(k);
      updateCount();
    });
  });
}

function updateCount() {
  const total = state.selectedText.size + state.selectedImg.size;
  const el = document.getElementById('totalCount');
  if (el) el.textContent = total;
}

// ========== 抽屉：单个标的 ==========
function openSingleDrawer(stockKey) {
  const stock = STOCKS[stockKey];
  if (!stock) return;
  const phone = document.querySelector('.phone-screen');
  if (!phone) return;

  const added = state.addedWatchlist.has(stockKey);

  // 简易 SVG 走势线
  const klineSvg = `
    <svg viewBox="0 0 300 140" preserveAspectRatio="none">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${stock.up ? '#e84545' : '#00a854'}" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="${stock.up ? '#e84545' : '#00a854'}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M0,100 L20,95 L40,92 L60,85 L80,78 L100,82 L120,70 L140,72 L160,58 L180,62 L200,48 L220,52 L240,40 L260,44 L280,36 L300,30 L300,140 L0,140 Z" fill="url(#g1)"/>
      <path d="M0,100 L20,95 L40,92 L60,85 L80,78 L100,82 L120,70 L140,72 L160,58 L180,62 L200,48 L220,52 L240,40 L260,44 L280,36 L300,30" stroke="${stock.up ? '#e84545' : '#00a854'}" stroke-width="1.5" fill="none"/>
    </svg>
  `;

  const drawerHtml = `
    <div class="drawer-mask" id="drawerMask"></div>
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-header">
        <div class="stock-info">
          <span class="stock-name">${stock.name}</span>
          <span class="stock-code">${stock.code}</span>
        </div>
        <span class="drawer-close" id="drawerClose">✕</span>
      </div>
      <div class="drawer-content">
        <div class="price-section">
          <span class="price ${stock.up ? 'up' : 'down'}">${stock.price}</span>
          <span class="change ${stock.up ? 'up' : 'down'}">${stock.change}</span>
          <span class="price-tag">今日 · 交易中</span>
        </div>
        <div class="kline-tabs">
          <div class="kline-tab active">分时</div>
          <div class="kline-tab">日 K</div>
          <div class="kline-tab">周 K</div>
          <div class="kline-tab">月 K</div>
        </div>
        <div class="kline-chart">${klineSvg}</div>
        <div class="metrics-grid">
          <div class="metric-item"><div class="metric-label">成交额</div><div class="metric-value">${stock.type === 'etf' ? '12.4亿' : '46.8亿'}</div></div>
          <div class="metric-item"><div class="metric-label">换手率</div><div class="metric-value">${stock.type === 'etf' ? '3.24%' : '1.85%'}</div></div>
          <div class="metric-item"><div class="metric-label">${stock.type === 'etf' ? 'PE 估值分位' : '市盈率 PE'}</div><div class="metric-value">${stock.type === 'etf' ? '42.3%' : '24.6'}</div></div>
          <div class="metric-item"><div class="metric-label">${stock.type === 'etf' ? '基金规模' : '总市值'}</div><div class="metric-value">${stock.type === 'etf' ? '1,286亿' : '3.2万亿'}</div></div>
        </div>
        <div class="risk-tip">
          ⚠️ 市场有风险，投资需谨慎。本页面仅提供客观行情数据，不构成投资建议。
        </div>
      </div>
      <div class="drawer-footer">
        <button class="drawer-btn secondary" id="addWatchBtn">${added ? '✓ 已加自选' : '☆ 加自选'}</button>
        <button class="drawer-btn primary">查看更多 →</button>
      </div>
    </div>
  `;

  phone.insertAdjacentHTML('beforeend', drawerHtml);

  const close = () => {
    phone.querySelector('.drawer-mask')?.remove();
    phone.querySelector('.drawer')?.remove();
  };
  document.getElementById('drawerMask').addEventListener('click', close);
  document.getElementById('drawerClose').addEventListener('click', close);
  document.getElementById('addWatchBtn').addEventListener('click', e => {
    if (state.addedWatchlist.has(stockKey)) {
      state.addedWatchlist.delete(stockKey);
      e.target.textContent = '☆ 加自选';
    } else {
      state.addedWatchlist.add(stockKey);
      e.target.textContent = '✓ 已加自选';
    }
  });
}

// ========== 抽屉：图片批量识别 ==========
function openBatchDrawer() {
  const phone = document.querySelector('.phone-screen');
  if (!phone) return;

  const keys = Array.from(state.selectedImg);
  const listHtml = keys.map(k => {
    const s = STOCKS[k];
    const added = state.addedWatchlist.has(k);
    return `
      <div class="batch-item" data-key="${k}">
        <div class="b-info">
          <div class="b-name">${s.name}</div>
          <div class="b-code">${s.code}</div>
        </div>
        <div class="b-price">
          <div class="b-pr ${s.up ? 'up' : 'down'}">${s.price}</div>
          <div class="b-ch ${s.up ? 'up' : 'down'}">${s.change}</div>
        </div>
        <span class="b-add ${added ? 'added' : ''}" data-add="${k}">${added ? '✓' : '+'}</span>
      </div>
    `;
  }).join('');

  const drawerHtml = `
    <div class="drawer-mask" id="drawerMask"></div>
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="batch-header">
        <div>
          <div class="batch-title">图中识别到 ${keys.length} 只标的</div>
          <div class="batch-count">AI 识别 · 点击单只看详情 · 点击「+」加自选</div>
        </div>
        <span class="drawer-close" id="drawerClose">✕</span>
      </div>
      <div class="batch-list">${listHtml}</div>
      <div class="drawer-footer">
        <button class="drawer-btn secondary" id="closeBatch">关闭</button>
        <button class="drawer-btn primary" id="batchAddAll">批量加自选（${keys.length}）</button>
      </div>
    </div>
  `;

  phone.insertAdjacentHTML('beforeend', drawerHtml);

  const close = () => {
    phone.querySelector('.drawer-mask')?.remove();
    phone.querySelector('.drawer')?.remove();
  };
  document.getElementById('drawerMask').addEventListener('click', close);
  document.getElementById('drawerClose').addEventListener('click', close);
  document.getElementById('closeBatch').addEventListener('click', close);

  document.getElementById('batchAddAll').addEventListener('click', () => {
    keys.forEach(k => state.addedWatchlist.add(k));
    phone.querySelectorAll('.b-add').forEach(el => {
      el.textContent = '✓';
      el.classList.add('added');
    });
  });

  phone.querySelectorAll('.batch-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.add) {
        e.stopPropagation();
        const k = e.target.dataset.add;
        if (state.addedWatchlist.has(k)) {
          state.addedWatchlist.delete(k);
          e.target.textContent = '+';
          e.target.classList.remove('added');
        } else {
          state.addedWatchlist.add(k);
          e.target.textContent = '✓';
          e.target.classList.add('added');
        }
        return;
      }
      close();
      setTimeout(() => openSingleDrawer(el.dataset.key), 300);
    });
  });
}

        <p>一期解决"创作者已经写出来的内容"（通过识别+承接），三期解决"创作者正要写的内容"（通过组件+自动化插入）。两者形成闭环。</p>
      </div>
      <div class="notes-section">
        <h4>组件库范围</h4>
        <ul>
          <li><strong>行情类</strong>：大盘指数、个股 K 线、资金流向</li>
          <li><strong>列表类</strong>：自定义股票列表、板块成分股</li>
          <li><strong>热度类</strong>：连板高度、涨跌停家数、热门股</li>
          <li><strong>基本面类</strong>：财报速览、公告摘要</li>
        </ul>
      </div>
      <div class="notes-section">
        <h4>自动化插入机制</h4>
        <ul>
          <li>AI 识别文章场景 → 推荐匹配组件</li>
          <li>创作者一键确认，不侵入写作节奏</li>
          <li>组件数据在读者端实时更新</li>
        </ul>
      </div>
      <div class="notes-section">
        <h4>为什么放到后期</h4>
        <p>先跑通一期的"承接转化"模式、验证与公众号事业部的合作机制、培养创作者习惯，再做更重的"组件供给"阶段。一口吃不成胖子。</p>

    </div>
